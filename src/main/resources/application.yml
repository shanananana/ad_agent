# 本地数据目录：运行时从此目录读写 campaigns.json / performance.json，默认为当前工作目录下的 data/
ad-agent:
  data:
    base-path: ${user.dir}/data
  # 长期记忆写入时机：true=每轮对话结束立即写入，false=空闲 5 分钟后在下一轮开始时写入
  memory:
    immediate-long-term-flush: true
  # 自动调价助手（α）：定时任务 + LLM（学习项目，数据可自造）
  bidding:
    enabled: true
    cron: "0 0 * * * ?"
    # 定时任务遍历该用户名下所有计划并分别调价；留空则读全局 campaigns.json
    schedule-user-id: "10001"
    alpha-min: 0.5
    alpha-max: 1.5
    max-relative-change: 0.2
    job-log-max-entries: 30

spring:
  application:
    name: ad-agent

  profiles:
    # 加载密钥配置（请将 application-secret.yml.example 复制为 application-secret.yml 并填入 api-key）
    include: secret

  # Spring AI：Markdown 技能 + 大模型与文生图（api-key 见 application-secret.yml）
  ai:
    markdown-skills:
      enabled: true
      locations:
        - classpath*:skills/**/*.md
      max-body-chars: 12000
    # 启用 DashScope 文生图（ImageModel Bean）；改为 none 可关闭出图能力，不影响对话
    model:
      image: dashscope
    dashscope:
      base-url: https://dashscope.aliyuncs.com
      # 读超时（毫秒）。出价任务 prompt 较大，默认 3 分钟；由 DashScopeRestClientTimeoutConfig 注入 RestClient
      read-timeout: 600000
      chat:
        options:
          model: qwen-plus-2025-07-28   # 千问模型，可改为 qwen-plus 等；若换用其他 provider，请改用对应配置（如 spring.ai.openai.chat.options.model）
          temperature: 0.7
          top-p: 0.8
      image:
        enabled: true
        options:
          model: wanx-v1
#          # 若接口报错可注释掉 size，按模型默认输出
#          size: 1024*1024
    tool:
      enabled: true
      internal-tool-execution-enabled: true

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework.ai: DEBUG
    com.shanananana.adagent: INFO
