# 本地数据目录：运行时从此目录读写 campaigns.json / performance.json，默认为当前工作目录下的 data/
ad-agent:
  data:
    base-path: ${user.dir}/data
  # 长期记忆写入时机：true=每轮对话结束立即写入，false=空闲 5 分钟后在下一轮开始时写入
  memory:
    immediate-long-term-flush: true

spring:
  application:
    name: ad-agent

  profiles:
    # 加载密钥配置（请将 application-secret.yml.example 复制为 application-secret.yml 并填入 api-key）
    include: secret

  # Spring AI 大模型（默认通义千问，可更换为 OpenAI / Azure / 智谱等）：api-key 由 application-secret.yml 提供
  ai:
    dashscope:
      base-url: https://dashscope.aliyuncs.com
      chat:
        options:
          model: qwen-turbo-latest   # 千问模型，可改为 qwen-plus 等；若换用其他 provider，请改用对应配置（如 spring.ai.openai.chat.options.model）
          temperature: 0.7
          top-p: 0.8
    tool:
      enabled: true
      internal-tool-execution-enabled: true

server:
  port: 8081

logging:
  level:
    root: INFO
    org.springframework.ai: DEBUG
    com.example.adagent: INFO
