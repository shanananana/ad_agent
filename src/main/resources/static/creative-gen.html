<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>创意素材 · 文生图</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      margin: 0;
      background: #1a1b26;
      color: #c0caf5;
      min-height: 100vh;
      padding: 20px 24px 40px;
    }
    h1 { font-size: 18px; color: #7aa2f7; margin: 0 0 8px; }
    .meta { font-size: 12px; color: #565f89; margin-bottom: 20px; line-height: 1.5; }
    .toolbar { margin-bottom: 16px; }
    .toolbar a { color: #7aa2f7; font-size: 13px; margin-right: 16px; }
    label { display: block; font-size: 13px; color: #a9b1d6; margin-bottom: 8px; }
    textarea {
      width: 100%;
      max-width: 640px;
      min-height: 120px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #3b4261;
      background: #16161e;
      color: #c0caf5;
      font-size: 14px;
      resize: vertical;
    }
    button {
      margin-top: 12px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #7aa2f7;
      color: #1a1b26;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button:hover:not(:disabled) { filter: brightness(1.08); }
    .status { font-size: 13px; margin-top: 12px; }
    .status.err { color: #f7768e; }
    .status.ok { color: #9ece6a; }
    .preview {
      margin-top: 24px;
      max-width: 1024px;
    }
    .preview img {
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid #3b4261;
      background: #16161e;
    }
    .preview .hint { font-size: 12px; color: #565f89; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="toolbar">
    <a href="/chat.html">← 对话页</a>
    <a href="/bid-strategy.html">自动调价</a>
  </div>
  <h1>创意素材 · 文生图</h1>
  <p class="meta">
    使用 DashScope <strong>通义万相</strong>（默认 <code>wanx-v1</code>，可在 <code>application.yml</code> 修改）。
    返回的图片链接通常 <strong>约 24 小时</strong> 有效，请及时右键保存或下载。
    需配置 <code>application-secret.yml</code> 中的 <code>spring.ai.dashscope.api-key</code>。
    勾选「保存到全局素材」时需填写 <strong>用户 ID</strong>（与对话页一致），写入 <code>creatives.json</code> 与本地图片；可通过
    <code>POST /api/ad-agent/catalog/bind-creative</code> 绑定到广告组。
  </p>

  <label for="userId">用户 ID（持久化时必填）</label>
  <input id="userId" type="text" placeholder="例如 demo_user"
    style="width:100%;max-width:320px;padding:8px 12px;border-radius:8px;border:1px solid #3b4261;background:#16161e;color:#c0caf5;font-size:14px;margin-bottom:12px;">
  <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:12px;">
    <input type="checkbox" id="persist"> 保存到全局素材（需模型返回 base64）
  </label>
  <label for="prompt">画面描述</label>
  <textarea id="prompt" placeholder="例如：电商主图，清爽背景，一瓶护肤品，柔和顶光，极简风格"></textarea>
  <div>
    <button type="button" id="btnGen">生成图片</button>
  </div>
  <div id="status" class="status" aria-live="polite"></div>
  <div class="preview" id="preview"></div>

  <script>
    const API = '/api/ad-agent/creative/generate';
    const statusEl = document.getElementById('status');
    const previewEl = document.getElementById('preview');

    function setStatus(msg, isErr) {
      statusEl.textContent = msg || '';
      statusEl.className = 'status' + (isErr ? ' err' : (msg ? ' ok' : ''));
    }

    document.getElementById('btnGen').addEventListener('click', async function () {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        setStatus('请先填写描述', true);
        return;
      }
      const btn = document.getElementById('btnGen');
      btn.disabled = true;
      previewEl.innerHTML = '';
      setStatus('生成中，请稍候…');
      const persist = document.getElementById('persist').checked;
      const userId = document.getElementById('userId').value.trim();
      if (persist && !userId) {
        setStatus('持久化时请填写用户 ID', true);
        return;
      }
      try {
        const body = { prompt: prompt };
        if (persist) {
          body.persist = true;
          body.userId = userId;
        }
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok || data.status !== 'ok') {
          setStatus(data.message || ('请求失败 ' + res.status), true);
          return;
        }
        var okMsg = '生成成功';
        if (data.creativeId) {
          okMsg += ' · 素材 ID: ' + data.creativeId;
        }
        if (data.persistedPath) {
          okMsg += ' · 已保存 ' + data.persistedPath;
        }
        setStatus(okMsg);
        if (data.imageUrl) {
          const img = document.createElement('img');
          img.src = data.imageUrl;
          img.alt = '生成结果';
          previewEl.appendChild(img);
          previewEl.appendChild(document.createElement('div')).className = 'hint';
          previewEl.lastChild.textContent = '若图片不显示，可能是链接需鉴权或已过期；可复制 imageUrl 到新标签页尝试打开。';
        } else if (data.b64Json) {
          const img = document.createElement('img');
          img.src = 'data:image/png;base64,' + data.b64Json;
          img.alt = '生成结果';
          previewEl.appendChild(img);
          if (data.creativeId && userId) {
            var local = document.createElement('div');
            local.className = 'hint';
            local.innerHTML = '本地访问（同源）：<a href="/api/ad-agent/creative/files/' + encodeURIComponent(userId.replace(/[^a-zA-Z0-9_-]/g, '_')) + '/' + encodeURIComponent(data.creativeId) + '.png" target="_blank" rel="noopener" style="color:#7aa2f7">打开 PNG</a>';
            previewEl.appendChild(local);
          }
        } else {
          setStatus('未返回图片地址', true);
        }
      } catch (e) {
        setStatus(e.message || '网络错误', true);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
